[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
normal = {family = "Inconsolata Nerd Font", style = "Regular"}
bold = {family = "Inconsolata Nerd Font", style = "Bold"}
italic = {family = "Inconsolata Nerd Font", style = "Italic"}
bold_italic = {family = "Inconsolata Nerd Font", style = "Bold Italic"}
size = 11.0

[font.offset]
x = 1
y = 0

[scrolling]
multiplier = 5

[window]
decorations = "Buttonless"

[colors.primary]
background = '#282828'
foreground = '#D4BE98'

[colors.cursor]
cursor = '#D4BE98'
text = '#282828'

[colors.normal]
black   = '#3C3836'
red     = '#EA6962'
green   = '#A9B665'
yellow  = '#D8A657'
blue    = '#7DAEA3'
magenta = '#D3869B'
cyan    = '#89B482'
white   = '#D4BE98'

[colors.bright]
black   = '#3C3836'
red     = '#EA6962'
green   = '#A9B665'
yellow  = '#D8A657'
blue    = '#7DAEA3'
magenta = '#D3869B'
cyan    = '#89B482'
white   = '#D4BE98'

